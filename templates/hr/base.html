<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}HR Dashboard{% endblock %} — Job Tracker</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <link rel="stylesheet" href="/static/hr.css"/>
</head>
<body class="hr-body">

<!-- ── TOP NAVBAR (matches screenshot) ── -->
<nav class="hr-topnav">
  <a href="/hr/dashboard" class="hr-brand-top">
    <span class="brand-emoji">💼</span>
    <span>Job Tracker</span>
  </a>

  <div class="hr-topnav-links">
    <a href="/hr/dashboard"
       class="hr-topnav-link {% if active=='hr_dashboard' %}active{% endif %}">
      Overview
    </a>
    <a href="/hr/applications"
       class="hr-topnav-link {% if active=='hr_applications' %}active{% endif %}">
      All Candidates
    </a>
    <a href="/hr/applicants"
       class="hr-topnav-link {% if active=='hr_applicants' %}active{% endif %}">
      Applicants
    </a>
  </div>

  <div class="hr-topnav-right">
    <div class="hr-avatar-btn" id="hrAvatar">HR</div>
    <a href="/logout" class="hr-signout">Sign out</a>
  </div>
</nav>

<!-- ── PAGE CONTENT ── -->
<div class="hr-content">
  {% block content %}{% endblock %}
</div>

<!-- ── Detail Modal ── -->
<div id="appModal" class="modal hidden">
  <div class="modal-box wide">
    <div class="modal-header">
      <h3 id="modalTitle">Application Detail</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody" style="padding:0;"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="toast hidden"></div>

<script src="/static/main.js"></script>
<script>
// Load HR user info
fetch('/api/me').then(r => r.json()).then(u => {
  const n = u.name || 'HR';
  document.getElementById('hrAvatar').textContent =
    n.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}).catch(() => {});

function closeModal() {
  document.getElementById('appModal').classList.add('hidden');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  setTimeout(() => t.classList.add('hidden'), 3000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
