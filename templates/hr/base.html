<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}HR Dashboard{% endblock %} — Job Tracker</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <link rel="stylesheet" href="/static/hr.css"/>
</head>
<body class="hr-body">

<!-- ── TOP NAVBAR ── -->
<nav class="hr-topnav">
  <a href="/hr/dashboard" class="hr-brand-top">
    <span class="brand-emoji">💼</span>
    <span>Job Tracker</span>
  </a>

  <div class="hr-topnav-links">
    <a href="/hr/dashboard"
       class="hr-topnav-link {% if active=='hr_dashboard' %}active{% endif %}">
      Overview
    </a>
    <a href="/hr/applications"
       class="hr-topnav-link {% if active=='hr_applications' %}active{% endif %}">
      All Candidates
    </a>
    <a href="/hr/applicants"
       class="hr-topnav-link {% if active=='hr_applicants' %}active{% endif %}">
      Applicants
    </a>
    <a href="/hr/vacancies"
       class="hr-topnav-link {% if active=='hr_vacancies' %}active{% endif %}">
      📢 Vacancies
    </a>
  </div>

  <div class="hr-topnav-right">
    <div class="hr-notif-wrap">
      <button class="hr-notif-btn" id="hrNotificationBell" type="button" aria-label="Notifications">
        🔔
        <span class="hr-notif-count hidden" id="hrNotifCount">0</span>
      </button>
      <div class="hr-notif-panel hidden" id="hrNotifPanel">
        <div class="hr-notif-panel-head">
          <div>
            <div class="hr-notif-panel-title">Notifications</div>
            <div class="hr-notif-panel-sub">Recent hiring updates</div>
          </div>
          <button class="hr-notif-mark-all" id="markAllRead" type="button">Mark all as read</button>
        </div>
        <div class="hr-notif-list" id="hrNotifList"></div>
      </div>
    </div>

    <div class="hr-profile-menu-wrap">
      <button class="hr-avatar-btn" id="hrAvatarButton" type="button" aria-label="Profile menu"
        data-hr-name="{{ user.name or 'HR' }}"
        data-avatar-url="{% if profile and profile.avatar_filename %}{{ url_for('serve_hr_avatar', filename=profile.avatar_filename) }}{% endif %}">
        <span id="hrAvatarText">HR</span>
      </button>
      <div class="hr-profile-menu hidden" id="hrProfileMenu">
        <a class="hr-profile-menu-item" href="/hr/profile">👤 My Profile</a>
        <a class="hr-profile-menu-item" href="/hr/profile#security">⚙️ Settings</a>
        <a class="hr-profile-menu-item danger" href="/logout">↩️ Sign Out</a>
      </div>
    </div>
  </div>
</nav>

<!-- ── PAGE CONTENT ── -->
<div class="hr-content">
  {% block content %}{% endblock %}
</div>

<!-- ── Detail Modal ── -->
<div id="appModal" class="modal hidden">
  <div class="modal-box wide">
    <div class="modal-header">
      <h3 id="modalTitle">Application Detail</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody" style="padding:0;"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="toast hidden"></div>

<script src="/static/main.js"></script>
<script>
const hrAvatarButton = document.getElementById('hrAvatarButton');
const hrAvatarText = document.getElementById('hrAvatarText');
const hrProfileMenu = document.getElementById('hrProfileMenu');

function updateHrAvatar(photoUrl, name) {
  if (!hrAvatarButton) return;
  if (photoUrl) {
    const img = document.createElement('img');
    img.id = 'hrAvatarImage';
    img.src = photoUrl;
    img.alt = `${name || 'HR'} avatar`;
    img.className = 'hr-avatar-image';
    hrAvatarButton.innerHTML = '';
    hrAvatarButton.appendChild(img);
    return;
  }
  const initials = (name || 'HR').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || 'HR';
  hrAvatarButton.innerHTML = '';
  hrAvatarText.textContent = initials;
  hrAvatarButton.appendChild(hrAvatarText);
}

window.updateHrAvatar = updateHrAvatar;

const initialHrName = hrAvatarButton?.dataset.hrName || 'HR';
const initialHrAvatar = hrAvatarButton?.dataset.avatarUrl || '';
if (initialHrAvatar) {
  updateHrAvatar(initialHrAvatar, initialHrName);
} else {
  updateHrAvatar(null, initialHrName);
}

fetch('/api/me').then(r => r.json()).then(u => {
  const n = u.name || initialHrName;
  if (u.avatar_url) {
    updateHrAvatar(u.avatar_url, n);
  } else {
    updateHrAvatar(null, n);
  }
}).catch(() => {});

if (hrAvatarButton && hrProfileMenu) {
  hrAvatarButton.addEventListener('click', (e) => {
    e.stopPropagation();
    hrProfileMenu.classList.toggle('hidden');
  });
}

const notifBell = document.getElementById('hrNotificationBell');
const notifPanel = document.getElementById('hrNotifPanel');
const notifList = document.getElementById('hrNotifList');
const notifBadge = document.getElementById('hrNotifCount');
const markAllBtn = document.getElementById('markAllRead');

function formatTimeLabel(time) {
  if (!time) return 'just now';
  const input = String(time).replace(' ', 'T');
  const dt = new Date(input);
  if (Number.isNaN(dt.getTime())) return 'just now';
  const diff = Date.now() - dt.getTime();
  const mins = Math.floor(diff / (1000 * 60));
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins} minute${mins === 1 ? '' : 's'} ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} hour${hours === 1 ? '' : 's'} ago`;
  const days = Math.floor(hours / 24);
  return `${days} day${days === 1 ? '' : 's'} ago`;
}

function renderNotifications(items) {
  if (!notifList) return;
  if (!items.length) {
    notifList.innerHTML = '<div class="hr-notif-empty">No notifications yet.</div>';
    return;
  }

  notifList.innerHTML = items.map(item => `
    <article class="hr-notif-item ${item.is_read ? '' : 'unread'}" data-id="${item.id}">
      <div class="hr-notif-left">
        <div class="hr-notif-icon">${item.icon || '🔔'}</div>
        <div class="hr-notif-body">
          <div class="hr-notif-header">
            <div class="hr-notif-title">${item.title || 'Notification'}</div>
            ${item.is_read ? '' : '<span class="hr-notif-dot"></span>'}
          </div>
          <div class="hr-notif-text">${item.message || 'No details available.'}</div>
          <div class="hr-notif-meta">${item.relative_time || formatTimeLabel(item.created_at)}</div>
        </div>
      </div>
      <button class="hr-notif-action" type="button" data-mark-id="${item.id}">Mark as read</button>
    </article>
  `).join('');

  notifList.querySelectorAll('[data-mark-id]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = Number(btn.dataset.markId);
      if (!id) return;
      await fetch(`/hr/api/notifications/${id}/read`, { method: 'POST' });
      await loadNotifications();
    });
  });
}

async function loadNotifications() {
  if (!notifList) return [];
  try {
    const res = await fetch('/hr/api/notifications');
    const items = res.ok ? await res.json() : [];
    renderNotifications(items);

    const unread = items.filter(item => !item.is_read).length;
    if (notifBadge) {
      notifBadge.textContent = unread;
      notifBadge.classList.toggle('hidden', unread === 0);
    }
    return items;
  } catch (err) {
    console.error(err);
    return [];
  }
}

async function markAllRead() {
  try {
    await fetch('/hr/api/notifications/read-all', { method: 'POST' });
    await loadNotifications();
  } catch (err) {
    console.error(err);
  }
}

if (notifBell && notifPanel) {
  notifBell.addEventListener('click', async (e) => {
    e.stopPropagation();
    notifPanel.classList.toggle('hidden');
    if (!notifPanel.classList.contains('hidden')) {
      await loadNotifications();
    }
  });
}

if (markAllBtn) {
  markAllBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    await markAllRead();
  });
}

document.addEventListener('click', (e) => {
  if (notifPanel && !notifPanel.classList.contains('hidden')) {
    if (!notifPanel.contains(e.target) && e.target !== notifBell) {
      notifPanel.classList.add('hidden');
    }
  }

  if (hrProfileMenu && !hrProfileMenu.classList.contains('hidden')) {
    if (!hrProfileMenu.contains(e.target) && e.target !== hrAvatarButton) {
      hrProfileMenu.classList.add('hidden');
    }
  }
});

loadNotifications();

function closeModal() {
  document.getElementById('appModal').classList.add('hidden');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  setTimeout(() => t.classList.add('hidden'), 3000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
